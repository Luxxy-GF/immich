map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
  listen 3000;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;
  client_max_body_size 100g;

  location = /api/socket.io {
    proxy_pass http://immich-server:2283/api/socket.io;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_read_timeout 86400;
  }

  location /api/socket.io/ {
    proxy_pass http://immich-server:2283/api/socket.io/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_read_timeout 86400;
  }

  location /api/ {
    proxy_pass http://immich-server:2283/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_request_buffering off;
  }

  location /.well-known/immich {
    proxy_pass http://immich-server:2283/.well-known/immich;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  location /custom.css {
    proxy_pass http://immich-server:2283/custom.css;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  location /socket.io/ {
    proxy_pass http://immich-server:2283/socket.io/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_read_timeout 86400;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}

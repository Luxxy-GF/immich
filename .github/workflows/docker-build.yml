name: Build and Publish Containers

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: luxxy-gf/immich-rs

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push immich-server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server-rs/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/immich-server:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/immich-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push immich-web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: web/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/immich-web:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/immich-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push immich-machine-learning
        uses: docker/build-push-action@v6
        with:
          context: ./machine-learning
          file: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/immich-machine-learning:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/immich-machine-learning:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
